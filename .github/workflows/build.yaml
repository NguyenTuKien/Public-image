name: Build and Push Changed Images

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
    paths:
      - 'image/**'
      - '.github/workflows/build.yaml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'image/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  detect:
    name: Detect Changed Images
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set matrix of changed images
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }} --depth=1
            COMPARE_REF="origin/${{ github.base_ref }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMPARE_REF=""
          else
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              COMPARE_REF="HEAD~1"
            else
              COMPARE_REF=""
            fi
          fi

          ALL_DOCKERFILES=()
          while IFS= read -r -d '' file; do
            suffix="${file#image/Dockerfile.}"
            ALL_DOCKERFILES+=("$suffix")
          done < <(find image -maxdepth 1 -type f -name "Dockerfile.*" -print0)

          BUILD_ALL=false
          IMAGES_TO_BUILD=()

          if [ -z "$COMPARE_REF" ]; then
            BUILD_ALL=true
          else
            CHANGED_FILES=$(git diff --name-only --diff-filter=AMR "$COMPARE_REF" -- image/)

            while IFS= read -r line; do
              if [ -z "$line" ]; then continue; fi
              if [[ ! "$line" =~ ^image/Dockerfile\..* ]]; then
                BUILD_ALL=true
                break
              fi
            done <<< "$CHANGED_FILES"

            if [ "$BUILD_ALL" = "false" ]; then
              while IFS= read -r line; do
                if [ -z "$line" ]; then continue; fi
                if [[ "$line" =~ ^image/Dockerfile\.(.*) ]] && [ -f "$line" ]; then
                  IMAGES_TO_BUILD+=("${BASH_REMATCH[1]}")
                fi
              done <<< "$CHANGED_FILES"
            fi
          fi

          if [ "$BUILD_ALL" = "true" ]; then
            IMAGES_TO_BUILD=("${ALL_DOCKERFILES[@]}")
          fi

          if [ ${#IMAGES_TO_BUILD[@]} -eq 0 ]; then
            JSON_MATRIX="[]"
          else
            JSON_MATRIX=$(printf '%s\n' "${IMAGES_TO_BUILD[@]}" | sort -u | jq -R . | jq -s -c .)
          fi

          echo "matrix=${JSON_MATRIX}" >> $GITHUB_OUTPUT

  build:
    name: Build Image (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: detect
    if: ${{ needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != '' }}
    strategy:
      matrix:
        image: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub if configured
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin
          else
            echo "Docker Hub credentials not configured. Skipping Docker Hub login."
          fi

      - name: Build Docker image
        run: |
          docker buildx build \
            --file ./image/Dockerfile.${{ matrix.image }} \
            --cache-from type=gha,scope=${{ matrix.image }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.image }} \
            --load \
            ./image

  push:
    name: Push Image (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [detect, build]
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && needs.detect.outputs.matrix != '[]' && needs.detect.outputs.matrix != '' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: ${{ fromJSON(needs.detect.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub if configured
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "$DOCKERHUB_TOKEN" | docker login docker.io -u "$DOCKERHUB_USERNAME" --password-stdin
          else
            echo "Docker Hub credentials not configured. Skipping Docker Hub login."
          fi

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          REPO_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_LOWER=$(echo "${{ matrix.image }}" | tr '[:upper:]' '[:lower:]')
          BASE_IMAGE="${{ env.REGISTRY }}/${REPO_LOWER}/${IMAGE_LOWER}"
          DOCKERFILE="./image/Dockerfile.${{ matrix.image }}"

          VERSION=$(grep -E '^ARG (VERSION|BASE_VERSION)=' "$DOCKERFILE" | head -n1 | cut -d= -f2 | tr -d '"' | tr -d "'")

          TAGS=("-t" "${BASE_IMAGE}:latest")

          if [ -n "$VERSION" ]; then
            TAGS+=("-t" "${BASE_IMAGE}:${VERSION}")
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)
          TAGS+=("-t" "${BASE_IMAGE}:${SHORT_SHA}")

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAGS+=("-t" "${BASE_IMAGE}:${{ github.ref_name }}")
          fi

          docker buildx build \
            --file "$DOCKERFILE" \
            "${TAGS[@]}" \
            --cache-from type=gha,scope=${{ matrix.image }} \
            --cache-to type=gha,mode=max,scope=${{ matrix.image }} \
            --push \
            ./image
